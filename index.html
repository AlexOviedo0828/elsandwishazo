<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>El Sandwishazo</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <!-- AOS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css"/>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css"/>

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top navbar-pro">
  <div class="container-fluid site-container py-2">

    <a class="navbar-brand">
      <span class="brand-logo-text logo-pro">El Sandwichazo</span>
    </a>

    <div class="d-flex gap-2">

      <div class="dropdown">
        <button class="btn btn-outline-light dropdown-toggle"
          data-bs-toggle="dropdown">
          <i class="bi bi-grid"></i> Menú
        </button>

        <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end">

          <li>
            <a class="dropdown-item" data-category="all">
              Todo
            </a>
          </li>

          <li><hr></li>

          <li><a class="dropdown-item" data-category="sandwich">Sandwich</a></li>
          <li><a class="dropdown-item" data-category="combos">Combos</a></li>
          <li><a class="dropdown-item" data-category="bebidas">Bebidas</a></li>

        </ul>
      </div>

      <a id="btnWhatsappTop" class="btn btn-warning btn-wa-pro">
        <i class="bi bi-whatsapp"></i> Pedir
      </a>

    </div>
  </div>
</nav>

<!-- CAROUSEL -->
<section class="carousel-section my-3">

  <div id="heroCarousel"
    class="carousel slide carousel-fade pro-carousel"
    data-bs-ride="carousel">

    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="assets/UN.jpg" class="w-100 carousel-img">
      </div>

      <div class="carousel-item">
        <video class="w-100 carousel-img" autoplay muted loop>
          <source src="assets/SANDWISHAZO ROPA VIEJA.mp4">
        </video>
      </div>

      <div class="carousel-item">
        <video class="w-100 carousel-img" autoplay muted loop>
          <source src="assets/sandwishazo.mp4">
        </video>
      </div>

    </div>

  </div>

</section>

<!-- CONTENIDO -->
<section class="page-wrap py-4">

  <div class="container-fluid site-container">

    <div class="row g-4">

      <!-- MENU -->
      <div class="col-lg-8">

        <h2>Menú</h2>

        <div id="menuGrid" class="menu-grid"></div>

      </div>

      <!-- CARRITO -->
      <div class="col-lg-4">

        <div class="cart-wrap">

          <div class="card cart-card">

            <div class="card-header">
              <i class="bi bi-cart"></i> Tu pedido
            </div>

            <div class="card-body">

              <ul id="cartList" class="list-group mb-2"></ul>

              <div class="d-flex justify-content-between">
                <span>Subtotal:</span>
                <strong id="cartSubtotal">$0</strong>
              </div>

              <div class="d-flex justify-content-between">
                <span>Despacho:</span>
                <strong id="deliveryFee">$0</strong>
              </div>

              <div class="d-flex justify-content-between">
                <span>Total:</span>
                <strong id="cartTotal">$0</strong>
              </div>

              <div class="d-grid gap-2 mt-2">

                <button id="btnSendOrder" class="btn btn-success">
                  Enviar Pedido
                </button>

                <button id="btnClearCart" class="btn btn-outline-danger">
                  Vaciar
                </button>

              </div>

            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer-pro text-center">

  <p>© 2026 El Sandwishazo</p>

</footer>


<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/app.js"></script>

<!-- AOS -->
<script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>

<script>
  AOS.init();
</script>

</body>
</html>
